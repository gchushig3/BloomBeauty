<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Administración | Bloom Beauty</title>
  <link href="css/style.css" rel="stylesheet">
  <style>
    :focus-visible { outline: 3px solid #FB9C83; outline-offset: 2px; border-radius: 4px; }
    .tab-active { background-color: #F6D4CB; color: #956659; border-bottom: 3px solid #FB9C83; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="font-sans text-black bg-white min-h-screen flex flex-col">
  <div id="site-header"></div>

  <main id="admin-content" class="max-w-[1200px] w-full mx-auto px-6 py-10 flex-1 hidden">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
      <h1 class="text-3xl font-bold text-brown">Panel de Administración</h1>
      <div class="flex bg-gray-100 p-1 rounded-xl">
        <button data-tab="stock" class="tab-btn px-6 py-2 font-bold text-sm text-gray-500 rounded-lg transition-all tab-active">Stock</button>
        <button data-tab="pedidos" class="tab-btn px-6 py-2 font-bold text-sm text-gray-500 rounded-lg transition-all">Pedidos</button>
      </div>
    </div>

    <!-- GESTIÓN DE STOCK -->
    <div id="pane-stock" class="tab-pane space-y-6">
      <div class="flex justify-between items-center bg-rose/10 p-4 rounded-2xl border border-rose/20">
        <h2 class="text-xl font-bold text-brown">Inventario de Productos</h2>
        <div class="relative w-full max-w-xs">
          <input type="text" id="search-stock" placeholder="Filtrar por nombre o marca..." 
                 class="w-full pl-10 pr-4 py-2 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-coral/20 outline-none text-sm">
          <svg class="absolute left-3 top-2.5 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        </div>
      </div>
      
      <div class="overflow-x-auto bg-white rounded-2xl shadow-soft border border-gray-100">
        <table class="w-full text-left border-collapse min-w-[600px]">
          <thead>
            <tr class="bg-gray-50 border-b border-gray-100 text-[10px] uppercase tracking-widest font-black text-gray-400">
              <th class="p-4">Producto</th>
              <th class="p-4">Marca</th>
              <th class="p-4">Stock</th>
              <th class="p-4">Añadir</th>
              <th class="p-4 text-center">Acción</th>
            </tr>
          </thead>
          <tbody id="stock-list" class="divide-y divide-gray-50"></tbody>
        </table>
      </div>
    </div>

    <!-- GESTIÓN DE PEDIDOS -->
    <div id="pane-pedidos" class="tab-pane hidden space-y-6">
      <h2 class="text-xl font-bold text-brown">Control de Órdenes</h2>
      <div class="overflow-x-auto bg-white rounded-2xl shadow-soft border border-gray-100">
        <table class="w-full text-left border-collapse min-w-[800px]">
          <thead>
            <tr class="bg-gray-50 border-b border-gray-100 text-[10px] uppercase tracking-widest font-black text-gray-400">
              <th class="p-4">ID</th>
              <th class="p-4">Cliente</th>
              <th class="p-4">Fecha</th>
              <th class="p-4">Total</th>
              <th class="p-4">Estado Actual</th>
              <th class="p-4 text-center">Actualizar a</th>
            </tr>
          </thead>
          <tbody id="orders-list" class="divide-y divide-gray-50"></tbody>
        </table>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script type="module" src="../controlador/contrVista/data.js"></script>
  <script type="module" src="../controlador/contrVista/main.js"></script>
  <script type="module" src="../controlador/contrVista/header.js"></script>
  <script type="module" src="../controlador/contrVista/view-admin.js"></script>
</body>
</html>
