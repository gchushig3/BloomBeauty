<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Perfil | Bloom Beauty</title>
  <link href="css/style.css" rel="stylesheet">
  <style>
    :focus-visible {
      outline: 3px solid #FB9C83;
      outline-offset: 2px;
      border-radius: 4px;
    }
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .tab-active {
      background-color: #F6D4CB;
      color: #956659;
    }
    @media (min-width: 768px) {
      .tab-active {
      border-right: 4px solid #FB9C83; /* coral */
      }
    }
  </style>
</head>
<body class="font-sans text-black bg-white min-h-screen flex flex-col">

  <div id="site-header"></div>

  <main class="max-w-[1200px] w-full mx-auto px-6 py-10 flex-1">
    <div id="auth-check" class="hidden text-center py-20">
      <p class="text-gray-500 mb-6">Debes iniciar sesión para acceder a tu perfil.</p>
      <a href="login.html" class="bg-coral text-white font-bold px-8 py-3 rounded-xl hover:bg-brown transition shadow-md">Iniciar Sesión</a>
    </div>

    <div id="client-content" class="grid grid-cols-1 md:grid-cols-4 gap-6 lg:gap-10">
      <!-- Sidebar de Navegación -->
      <aside class="md:col-span-1 space-y-4">
        <div class="mb-4 md:mb-8 px-2 md:px-4 text-center md:text-left">
          <h1 class="text-2xl md:text-3xl font-bold text-brown">Mi Cuenta</h1>
          <p class="text-base text-gray-500" id="user-welcome">¡Hola!</p>
        </div>
        <nav class="flex md:flex-col border-b md:border-b-0 md:border-r border-gray-100 overflow-x-auto no-scrollbar whitespace-nowrap md:whitespace-normal">
          <button data-tab="perfil" class="tab-btn flex-1 md:flex-none flex flex-col md:flex-row items-center gap-1 md:gap-3 text-center md:text-left px-5 py-3 md:py-4 font-bold text-gray-500 hover:bg-rose/10 transition-all md:rounded-l-2xl tab-active">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
            </svg>
            <span>Tu Perfil</span>
          </button>
          <button data-tab="pedidos" class="tab-btn flex-1 md:flex-none flex flex-col md:flex-row items-center gap-1 md:gap-3 text-center md:text-left px-5 py-3 md:py-4 font-bold text-gray-500 hover:bg-rose/10 transition-all md:rounded-l-2xl">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 1 0-7.5 0v4.5m11.356-1.993 1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 0 1-1.12-1.243l1.264-12A1.125 1.125 0 0 1 5.513 7.5h12.974c.576 0 1.059.435 1.119 1.007ZM8.625 10.5a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm7.5 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" />
            </svg>
            <span>Pedidos</span>
          </button>
          <button data-tab="favoritos" class="tab-btn flex-1 md:flex-none flex flex-col md:flex-row items-center gap-1 md:gap-3 text-center md:text-left px-5 py-3 md:py-4 font-bold text-gray-500 hover:bg-rose/10 transition-all md:rounded-l-2xl">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z" />
            </svg>
            <span>Favoritos</span>
          </button>
          <button data-tab="reseñas" class="tab-btn flex-1 md:flex-none flex flex-col md:flex-row items-center gap-1 md:gap-3 text-center md:text-left px-5 py-3 md:py-4 font-bold text-gray-500 hover:bg-rose/10 transition-all md:rounded-l-2xl">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M7.5 8.25h9m-9 3H12m-9.75 1.51c0 1.6 1.123 2.994 2.707 3.227 1.129.166 2.27.293 3.423.379.35.026.67.21.865.501L12 21l2.755-4.133a1.14 1.14 0 0 1 .865-.501 48.172 48.172 0 0 0 3.423-.379c1.584-.233 2.707-1.626 2.707-3.228V6.741c0-1.602-1.123-2.995-2.707-3.228A48.394 48.394 0 0 0 12 3c-2.392 0-4.744.175-7.043.513C3.373 3.746 2.25 5.14 2.25 6.741v6.018Z" />
            </svg>
            <span>Reseñas</span>
          </button>
          <button id="btn-logout" class="hidden md:flex items-center gap-3 text-left px-5 py-4 font-bold text-red-500 hover:bg-red-50 transition-all rounded-l-2xl mt-6 border-t border-gray-50">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 9V5.25A2.25 2.25 0 0 1 10.5 3h6a2.25 2.25 0 0 1 2.25 2.25v13.5A2.25 2.25 0 0 1 16.5 21h-6a2.25 2.25 0 0 1-2.25-2.25V15m-3 0-3-3m0 0 3-3m-3 3H15" />
            </svg>
            Cerrar Sesión
          </button>
        </nav>
      </aside>

      <!-- Área de Contenido -->
      <section class="md:col-span-3 bg-white border border-gray-50 rounded-3xl p-5 md:p-10 shadow-soft min-h-[450px]">
        <!-- Tab: Perfil -->
        <div id="pane-perfil" class="tab-pane space-y-6">
          <h2 class="text-2xl font-bold text-brown border-b border-rose/20 pb-4 flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
              <path stroke-linecap="round" stroke-linejoin="round" d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
            </svg>
            Información Personal
          </h2>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <div>
              <label class="flex items-center gap-1.5 text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-3 h-3"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" /></svg>
                Nombre Completo
              </label>
              <p id="p-name" class="text-gray-800 font-semibold bg-gray-50/80 border border-gray-100 p-4 rounded-xl">---</p>
            </div>
            <div>
              <label class="flex items-center gap-1.5 text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-3 h-3"><path stroke-linecap="round" stroke-linejoin="round" d="M15 9h3.75M15 12h3.75M15 15h3.75M4.5 19.5h15a2.25 2.25 0 0 0 2.25-2.25V6.75A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25v10.5A2.25 2.25 0 0 0 4.5 19.5Zm6-10.125a1.875 1.875 0 1 1-3.75 0 1.875 1.875 0 0 1 3.75 0Zm1.294 6.336a6.721 6.721 0 0 1-3.17.789 6.721 6.721 0 0 1-3.168-.789 3.376 3.376 0 0 1 6.338 0Z" /></svg>
                Identificación CI.
              </label>
              <p id="p-ci" class="text-gray-800 font-semibold bg-gray-50/80 border border-gray-100 p-4 rounded-xl">---</p>
            </div>
            <div>
              <label class="flex items-center gap-1.5 text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-3 h-3"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 1.5H8.25A2.25 2.25 0 0 0 6 3.75v16.5a2.25 2.25 0 0 0 2.25 2.25h7.5A2.25 2.25 0 0 0 18 20.25V3.75a2.25 2.25 0 0 0-2.25-2.25H13.5m-3 0V3h3V1.5m-3 0h3m-3 18.75h3" /></svg>
                Teléfono
              </label>
              <p id="p-phone" class="text-gray-800 font-semibold bg-gray-50/80 border border-gray-100 p-4 rounded-xl">---</p>
            </div>
            <div>
              <label class="flex items-center gap-1.5 text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-3 h-3"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75" /></svg>
                Correo Electrónico
              </label>
              <p id="p-email" class="text-gray-800 font-semibold bg-gray-50/80 border border-gray-100 p-4 rounded-xl truncate" title="Correo electrónico"></p>
            </div>
          </div>
        </div>

        <!-- Tab: Pedidos -->
        <div id="pane-pedidos" class="tab-pane hidden space-y-4">
          <h2 class="text-xl font-bold text-brown border-b pb-2 flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
            </svg>
            Historial de Pedidos
          </h2>
          <!-- Los pedidos del usuario se renderizarán aquí -->
          <div id="order-list" class="grid grid-cols-1 gap-4"></div>
        </div>

        <!-- Tab: Favoritos -->
        <div id="pane-favoritos" class="tab-pane hidden space-y-4">
          <h2 class="text-xl font-bold text-brown border-b pb-2 flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z" />
            </svg>
            Mis Favoritos
          </h2>
          <!-- Los productos favoritos se renderizarán aquí -->
          <div id="favorites-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-x-8 gap-y-12"></div>
        </div>

        <!-- Tab: Reseñas -->
        <div id="pane-reseñas" class="tab-pane hidden space-y-4">
          <h2 class="text-xl font-bold text-brown border-b pb-2 flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
              <path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499a.562.562 0 0 1 1.04 0l2.125 5.111a.563.563 0 0 0 .475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 0 0-.182.557l1.285 5.385a.562.562 0 0 1-.84.61l-4.725-2.885a.562.562 0 0 0-.586 0L6.982 20.54a.562.562 0 0 1-.84-.61l1.285-5.386a.562.562 0 0 0-.182-.557l-4.204-3.602a.562.562 0 0 1 .321-.988l5.518-.442a.563.563 0 0 0 .475-.345L11.48 3.5Z" />
            </svg>
            Tus Experiencias
          </h2>
          <!-- Las reseñas del usuario se renderizarán aquí -->
          <div id="user-reviews-list" class="space-y-4"></div>
        </div>

        <!-- Botón Salir (Solo Móvil) -->
        <button id="btn-logout-mobile" class="md:hidden w-full flex items-center justify-center gap-2 px-4 py-4 font-bold text-red-500 bg-red-50 rounded-xl mt-10">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 9V5.25A2.25 2.25 0 0 1 10.5 3h6a2.25 2.25 0 0 1 2.25 2.25v13.5A2.25 2.25 0 0 1 16.5 21h-6a2.25 2.25 0 0 1-2.25-2.25V15m-3 0-3-3m0 0 3-3m-3 3H15" />
          </svg>
          Cerrar Sesión
        </button>
      </section>
    </div>

  </main>

  <div id="site-footer"></div>

  <script type="module" src="../controlador/contrVista/data.js"></script>
  <script type="module" src="../controlador/contrVista/main.js"></script>
  <script type="module" src="../controlador/contrVista/header.js"></script>
  <script type="module" src="../controlador/contrVista/view-cliente.js"></script>
</body>
</html>
