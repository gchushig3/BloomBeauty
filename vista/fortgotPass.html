<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro / Inicio sesión | Bloom Beauty</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../controlador/contrVista/tailwind-config.js"></script>
    <style>
        :focus-visible {
            outline: 3px solid #FB9C83;
            outline-offset: 2px;
            border-radius: 4px;
        }
    </style>
</head>

<body class="font-sans text-black bg-white min-h-screen flex flex-col">

    <div id="site-header"></div>

    <main class="max-w-[480px] w-full mx-auto px-6 py-12 flex-1">
        <div class="bg-white rounded-xl shadow-card p-8">
            <h1 class="text-2xl font-bold text-brown text-center mb-4">Restablecer contraseña</h1>
            <p class="text-center text-gray-600 text-sm mb-6">
                Ingrese su correo para el envío de un enlace de recuperación
            </p>
            <form id="forgot-pass-form" class="space-y-6">
                <div>
                    <label for="fg-email" class="block font-semibold text-sm mb-1">Correo electrónico</label>
                    <input id="fg-email" type="email" required aria-required="true" placeholder="tu@email.com"
                        class="w-full bg-white rounded px-3 py-2 border border-gray-300 focus:border-coral outline-none transition-all shadow-sm" aria-describedby="err-fg-email" />
                    <p class="text-red-600 text-xs mt-1" id="err-fg-email"></p>
                </div>
                <button type="submit" class="w-full bg-coral text-white font-semibold py-3 rounded hover:bg-brown transition shadow-md">
                    Restablecer contraseña
                </button>
            </form>
            <div class="text-center mt-8">
                <a href="login.html" class="text-sm text-brown font-bold underline hover:text-coral transition-colors">Volver al inicio de sesión</a>
            </div>
        </div>
    </main>

    <div id="site-footer"></div>

    <script type="module" src="../controlador/contrVista/carrito.js"></script>
    <script type="module" src="../controlador/contrVista/main.js"></script>
    <script type="module" src="../controlador/contrVista/header.js"></script>
    <script type="module" src="../controlador/contrVista/view-forgot-pass.js"></script>
</body>

</html>
